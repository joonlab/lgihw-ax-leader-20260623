<div class="clip-section">

        <span style="font-size:1.1rem">📧</span>

          <div class="email-value" style="font-size:0.82rem;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">wns9133@gmail.com</div>
        </div>
      </button>
      <a href="https://bio.link/joonpark" target="_blank" rel="noopener noreferrer" style="display:flex;align-items:center;gap:10px;padding:12px 14px;background:var(--bg-white);border:1px solid var(--border);border-radius:10px;text-decoration:none;color:var(--text-body);transition:all 0.2s" onmouseover="this.style.borderColor='var(--brand)';this.style.transform='translateY(-1px)'" onmouseout="this.style.borderColor='var(--border)';this.style.transform='translateY(0)'">
        <span style="font-size:1.1rem">🔗</span>
        <div style="flex:1;min-width:0">
          <div style="font-size:0.7rem;color:var(--text-muted);margin-bottom:2px">Bio Link</div>
          <div style="font-size:0.82rem;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">bio.link/joonpark</div>
        </div>
      </a>
      <a href="https://open.kakao.com/o/gl7JSkSg" target="_blank" rel="noopener noreferrer" style="display:flex;align-items:center;gap:10px;padding:12px 14px;background:var(--bg-white);border:1px solid var(--border);border-radius:10px;text-decoration:none;color:var(--text-body);transition:all 0.2s" onmouseover="this.style.borderColor='var(--brand)';this.style.transform='translateY(-1px)'" onmouseout="this.style.borderColor='var(--border)';this.style.transform='translateY(0)'">
        <span style="font-size:1.1rem">💬</span>
        <div style="flex:1;min-width:0">
          <div style="font-size:0.7rem;color:var(--text-muted);margin-bottom:2px">카카오톡 오픈채팅</div>

        </div>
      </a>
      <a href="https://youtube.com/@joonlab98" target="_blank" rel="noopener noreferrer" style="display:flex;align-items:center;gap:10px;padding:12px 14px;background:var(--bg-white);border:1px solid var(--border);border-radius:10px;text-decoration:none;color:var(--text-body);transition:all 0.2s" onmouseover="this.style.borderColor='var(--brand)';this.style.transform='translateY(-1px)'" onmouseout="this.style.borderColor='var(--border)';this.style.transform='translateY(0)'">
        <span style="font-size:1.1rem">📺</span>
        <div style="flex:1;min-width:0">
          <div style="font-size:0.7rem;color:var(--text-muted);margin-bottom:2px">유튜브 채널</div>
          <div style="font-size:0.82rem;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">@joonlab98 — 준랩</div>

    <div class="info-block" style="margin-top:20px;background:var(--bg-offwhite);border-left:3px solid var(--text-muted)">
      <div style="font-size:0.82rem;color:var(--text-secondary);line-height:1.7">오늘 1차수(6/23)·2차수(6/25)는 <strong>보조 강사</strong>가 함께 순회하며 막히는 분들을 곁에서 돕습니다. 손을 들어 언제든 불러주세요.</div>
